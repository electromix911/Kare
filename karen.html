<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buenas noches, Karen</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(180deg,#0b1026,#1d2b64,#000);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
color:white;
text-align:center;
}

.contenedor{
padding:20px;
}

h1{
font-size:34px;
margin-bottom:15px;
animation:brillo 2s infinite alternate;
}

p{
font-size:20px;
margin-bottom:25px;
}

button{
padding:15px 35px;
font-size:18px;
border:none;
border-radius:30px;
background:#ff4d88;
color:white;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.08);
background:#ff1f6b;
}

#foto{
display:none;
margin-top:25px;
width:260px;
border-radius:20px;
border:5px solid white;
box-shadow:0 0 25px #ff66aa;
}

@keyframes brillo{
from{text-shadow:0 0 10px #fff;}
to{text-shadow:0 0 30px #ff69b4;}
}

.corazon{
position:absolute;
color:#ff4d88;
font-size:20px;
animation:subir 6s linear infinite;
}

@keyframes subir{
0%{
transform:translateY(100vh) scale(.5);
opacity:1;
}
100%{
transform:translateY(-120px) scale(1.5);
opacity:0;
}
}
</style>
</head>

<body>

<div class="contenedor">
<h1>🌙 Que tengas una linda noche de trabajo, señorita bonita. 💖</h1>

<p>Espero que todo te salga muy bien. Cuídate mucho y no olvides sonreír. ✨</p>

<button onclick="mostrarFoto()">Presióname 💕</button>

<br>

<img id="foto" src="karen.jpg" alt="Karen">

</div>

<script>
function mostrarFoto(){
document.getElementById("foto").style.display="block";
}

function corazones(){
const c=document.createElement("div");
c.className="corazon";
c.innerHTML="❤";
c.style.left=Math.random()*100+"vw";
c.style.fontSize=(20+Math.random()*30)+"px";
c.style.animationDuration=(4+Math.random()*3)+"s";
document.body.appendChild(c);

setTimeout(()=>{
c.remove();
},7000);
}

setInterval(corazones,250);
</script>

</body>
</html>
